name: Tests

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version:
          - '3.14'
    name: Windows, SQLite, Python ${{ matrix.python-version }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'tests/requirements/py3.txt'
      - name: Install and upgrade packaging tools
        run: python -m pip install --upgrade pip wheel
      - run: python -m pip install -r tests/requirements/py3.txt -e .
      - name: Run tests
        run: python -Wall tests/runtests.py -v2

  javascript-tests:
    runs-on: ubuntu-latest
    name: JavaScript tests
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package.json'
      - name: Diagnostic — before npm install
        run: |
          echo "=== runner image ==="
          cat /etc/os-release | head -5
          echo
          echo "=== ~/.cache/puppeteer (before install) ==="
          ls -laR ~/.cache/puppeteer/ 2>&1 || echo "directory does not exist"
          echo
          echo "=== ~/.npm cache size ==="
          du -sh ~/.npm 2>&1 || echo "no ~/.npm"
          echo
          echo "=== system chrome binaries ==="
          for bin in google-chrome google-chrome-stable chromium chromium-browser chrome; do
            path=$(which "$bin" 2>/dev/null) && echo "$bin -> $path ($($bin --version 2>&1))" || echo "$bin: not found"
          done
          echo
          echo "=== puppeteer-related env vars ==="
          env | grep -iE 'puppeteer|chrome|npm_config' || echo "(none)"
          echo
          echo "=== puppeteer config files in repo ==="
          find . -maxdepth 3 \( -name '.puppeteerrc*' -o -name 'puppeteer.config.*' -o -name '.npmrc' \) 2>/dev/null
          echo
          echo "=== npm config (script-related) ==="
          npm config get ignore-scripts
          npm config get fund
          npm config get audit

      - name: npm install (with foreground scripts)
        run: npm install --foreground-scripts --loglevel=info

      - name: Diagnostic — after npm install
        run: |
          echo "=== ~/.cache/puppeteer (after install) ==="
          ls -laR ~/.cache/puppeteer/ 2>&1 || echo "directory does not exist"
          echo
          echo "=== installed puppeteer version ==="
          cat node_modules/puppeteer/package.json | grep -E '"(name|version)"' | head -5
          echo
          echo "=== puppeteer's expected chrome version ==="
          node -e "const p = require('puppeteer'); console.log('executablePath:', p.executablePath());" 2>&1 || echo "executablePath() failed"
          echo
          echo "=== does the expected path exist? ==="
          EXPECTED=$(node -e "console.log(require('puppeteer').executablePath())" 2>/dev/null)
          if [ -n "$EXPECTED" ]; then
            ls -la "$EXPECTED" 2>&1 || echo "MISSING: $EXPECTED"
          fi
      - run: npm test

  scripts-tests:
    runs-on: ubuntu-latest
    name: Scripts tests
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: python -m unittest discover -v -s scripts/
